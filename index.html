<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#211b3d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>星屑ハムスター・ダンジョン</title>
  <style>
:root {
  --bg: #17142d;
  --panel: #282344;
  --ink: #fff8e9;
  --muted: #b8afcf;
  --pink: #ff8fb8;
  --gold: #ffd166;
  --green: #69db9c;
  --line: rgba(255,255,255,.1);
}

* { box-sizing: border-box; }

html {
  width: 100%;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

body {
  width: 100%;
  margin: 0;
  overflow-x: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 15% 3%, rgba(255,143,184,.18), transparent 24rem),
    radial-gradient(circle at 90% 20%, rgba(120,184,255,.14), transparent 26rem),
    var(--bg);
  font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  min-height: 100vh;
}

body::before {
  content: "✦  ·  ✧    ·  ✦  ·   ✧   ·";
  position: fixed;
  inset: 10px 0 auto;
  color: rgba(255,255,255,.14);
  text-align: center;
  letter-spacing: 1.2rem;
  pointer-events: none;
}

button {
  min-height: 44px;
  font: inherit;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.game-shell {
  width: min(100%, 520px);
  margin: 0 auto;
  padding:
    max(20px, env(safe-area-inset-top))
    max(12px, env(safe-area-inset-right))
    max(44px, env(safe-area-inset-bottom))
    max(12px, env(safe-area-inset-left));
}

.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 10px 18px;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--pink);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .12em;
}

h1 {
  margin: 0;
  font-size: clamp(25px, 8vw, 38px);
  line-height: 1.05;
}

h1 span { color: var(--gold); }

.hero-hamster {
  position: relative;
  font-size: 56px;
  filter: drop-shadow(0 8px 10px #0d0b1d);
}

.hero-hamster span {
  position: absolute;
  right: -9px;
  bottom: -5px;
  font-size: 25px;
}

.panel {
  margin-bottom: 12px;
  padding: 15px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(145deg, rgba(52,46,85,.98), rgba(35,31,63,.98));
  box-shadow: 0 10px 24px rgba(7,5,18,.28);
}

.section-title, .floor-line, .wallet {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.section-title { margin-bottom: 11px; }
.section-title h2 { margin: 0; font-size: 16px; }
.level-badge { color: var(--muted); }
.level-badge strong { color: var(--gold); font-size: 20px; }
.hint { color: var(--muted); font-size: 12px; }

.bar {
  position: relative;
  height: 21px;
  margin: 7px 0;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 99px;
  background: #151329;
}

.bar span {
  display: block;
  width: 0;
  height: 100%;
  transition: width .22s ease;
}

.bar b {
  position: absolute;
  inset: 1px 0 0;
  text-align: center;
  font-size: 12px;
  text-shadow: 0 1px 2px #000;
}

.hp-bar span { background: linear-gradient(90deg, #ff6675, #ff91a1); }
.exp-bar span { background: linear-gradient(90deg, #5a9eff, #8ecbff); }
.enemy-bar span { background: linear-gradient(90deg, #64d792, #98e6a8); }

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin-top: 12px;
}

.stat-grid div, .wallet {
  padding: 9px 11px;
  border-radius: 11px;
  background: rgba(10,8,27,.27);
}

.stat-grid div {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

.stat-grid span { color: var(--muted); }

.wallet {
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
}

.wallet b { color: var(--ink); }
.floor-line span { color: var(--muted); font-size: 14px; }
.floor-line strong { color: var(--gold); font-size: 25px; }

.battle-stage {
  display: grid;
  grid-template-columns: 1fr 38px 1fr;
  align-items: center;
  margin: 8px 0;
}

.fighter {
  display: grid;
  place-items: center;
  gap: 2px;
  font-size: 12px;
}

.fighter span {
  font-size: 48px;
  filter: drop-shadow(0 6px 6px rgba(0,0,0,.25));
}

.enemy span { animation: float 1.4s ease-in-out infinite alternate; }

.battle-mark {
  color: var(--pink);
  font-size: 12px;
  font-weight: 900;
  text-align: center;
}

.battle-status {
  min-height: 20px;
  margin: 10px 0;
  color: var(--muted);
  font-size: 13px;
  text-align: center;
}

@keyframes float {
  to { transform: translateY(-5px); }
}

.battle-buttons {
  display: grid;
  grid-template-columns: 1.35fr 1fr;
  gap: 8px;
}

.start-button, .return-button, .modal button {
  width: 100%;
  padding: 11px;
  border: 0;
  border-radius: 12px;
  color: #2a1e25;
  background: linear-gradient(135deg, var(--gold), #ffb865);
  font-weight: 900;
  box-shadow: 0 4px 0 #b87538;
}

.start-button {
  color: #112319;
  background: linear-gradient(135deg, var(--green), #a8eeaa);
  box-shadow: 0 4px 0 #388c61;
}

.start-button.stopping {
  color: var(--ink);
  background: #675d92;
  box-shadow: 0 4px 0 #3d365d;
}

.start-button:active, .return-button:active, .modal button:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #b87538;
}

.equipment-list, .drop-list {
  display: grid;
  gap: 8px;
}

.equipment, .drop {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  align-items: center;
  gap: 9px;
  min-width: 0;
  padding: 10px;
  border: 1px solid transparent;
  border-radius: 12px;
  background: rgba(10,8,27,.3);
}

.item-icon {
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,.07);
  font-size: 20px;
}

.item-main { min-width: 0; }

.item-name {
  display: block;
  overflow-wrap: anywhere;
  font-size: 13px;
  line-height: 1.35;
}

.item-stats {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
}

.item-score {
  color: var(--gold);
  font-size: 12px;
  white-space: nowrap;
}

.drop-actions {
  display: grid;
  gap: 4px;
}

.drop-actions button, .text-button {
  padding: 5px 8px;
  border: 0;
  border-radius: 7px;
  color: var(--ink);
  background: #675d92;
  font-size: 12px;
  font-weight: 700;
}

.drop-actions button { min-width: 58px; }
.text-button { min-height: 36px; }
.drop-actions .equip-button { color: #112319; background: var(--green); }
.better { border-color: rgba(105,219,156,.45); }

.empty {
  padding: 16px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

.rarity-N { color: #d4cedd; }
.rarity-R { color: #72bdff; }
.rarity-SR { color: #d689ff; }
.rarity-SSR { color: #ffd166; text-shadow: 0 0 8px rgba(255,209,102,.35); }
.rarity-UR { color: #ff7c9d; text-shadow: 0 0 8px rgba(255,124,157,.45); }

.battle-log {
  height: clamp(170px, 28vh, 260px);
  overflow-y: auto;
  overscroll-behavior: contain;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.7;
  scrollbar-color: #675d92 transparent;
}

.battle-log p {
  margin: 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}

.battle-log .good { color: var(--green); }
.battle-log .rare { color: var(--gold); }
.text-button { background: transparent; color: var(--muted); }

footer {
  padding-top: 8px;
  color: #817999;
  font-size: 10px;
  text-align: center;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(10,8,25,.78);
  backdrop-filter: blur(5px);
}

.modal-backdrop.hidden { display: none; }

.modal {
  width: min(100%, 350px);
  padding: 24px;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px;
  background: var(--panel);
  text-align: center;
  box-shadow: 0 20px 60px #080617;
}

.modal-icon { font-size: 48px; }
.modal h2 { margin: 8px 0; }
.modal p { color: var(--muted); font-size: 12px; }

.offline-rewards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 18px 0;
  color: var(--gold);
}

@media (min-width: 600px) {
  .game-shell { padding-top: 34px; }
  .panel { padding: 18px; }
}

@media (max-width: 380px) {
  .game-shell { padding-left: 8px; padding-right: 8px; }
  .panel { padding: 12px; border-radius: 15px; }
  .hero-hamster { font-size: 46px; }
  .equipment, .drop {
    grid-template-columns: 34px minmax(0, 1fr) auto;
    padding: 8px;
    gap: 7px;
  }
  .item-icon { width: 32px; height: 32px; }
  .battle-buttons { grid-template-columns: 1fr; }
}
  </style>
</head>
<body>
  <main class="game-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">放置ハクスラ・プロトタイプ</p>
        <h1>星屑ハムスター<br><span>ダンジョン</span></h1>
      </div>
      <div class="hero-hamster" aria-label="ハムスター冒険者">🐹<span>⚔️</span></div>
    </header>

    <section class="panel player-panel">
      <div class="section-title">
        <h2>冒険者</h2>
        <div class="level-badge">Lv.<strong id="level">1</strong></div>
      </div>
      <div class="bar hp-bar"><span id="player-hp-bar"></span><b id="player-hp-text">30 / 30</b></div>
      <div class="bar exp-bar"><span id="exp-bar"></span><b id="exp-text">0 / 20 EXP</b></div>
      <div class="stat-grid">
        <div><span>⚔️ 攻撃</span><strong id="attack">0</strong></div>
        <div><span>🛡️ 防御</span><strong id="defense">0</strong></div>
        <div><span>💨 速度</span><strong id="speed">0</strong></div>
        <div><span>🍀 運</span><strong id="luck">0</strong></div>
      </div>
      <div class="wallet">
        <span>🪙 <b id="gold">0</b> G</span>
        <span>🏆 最深 <b id="best-floor">1</b>F</span>
      </div>
    </section>

    <section class="panel battle-panel">
      <div class="floor-line">
        <span>現在の階層</span>
        <strong><b id="floor">1</b>F</strong>
      </div>
      <div class="battle-stage">
        <div class="fighter"><span>🐹</span><b>もちまる</b></div>
        <div class="battle-mark">VS</div>
        <div class="fighter enemy"><span id="enemy-icon">🟢</span><b id="enemy-name">敵</b></div>
      </div>
      <div class="bar enemy-bar"><span id="enemy-hp-bar"></span><b id="enemy-hp-text">0 / 0</b></div>
      <p class="battle-status" id="battle-status">「探索開始」を押すと冒険が始まります</p>
      <div class="battle-buttons">
        <button class="start-button" id="start-button">⚔️ 探索開始</button>
        <button class="return-button" id="return-button">🏕️ 帰還</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>装備</h2>
        <span class="hint">合計値で比較</span>
      </div>
      <div class="equipment-list" id="equipment-list"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>最近のドロップ</h2>
        <span class="hint">最大6個</span>
      </div>
      <div class="drop-list" id="drop-list"></div>
    </section>

    <section class="panel log-panel">
      <div class="section-title">
        <h2>戦闘ログ</h2>
        <button class="text-button" id="clear-log-button">消去</button>
      </div>
      <div class="battle-log" id="battle-log"></div>
    </section>

    <footer>自動セーブ中 ✨ ブラウザを閉じても冒険は続きます</footer>
  </main>

  <div class="modal-backdrop hidden" id="offline-modal">
    <div class="modal">
      <div class="modal-icon">🌙✨</div>
      <h2>おかえりなさい！</h2>
      <p id="offline-time">留守中も探索していました。</p>
      <div class="offline-rewards">
        <span>🪙 <b id="offline-gold">0</b> G</span>
        <span>💫 <b id="offline-exp">0</b> EXP</span>
      </div>
      <button id="offline-close-button">受け取る</button>
    </div>
  </div>

  <script>
"use strict";

const SAVE_KEY = "stardust-hamster-save-v1";

const SLOT_INFO = {
  weapon: { label: "武器", icon: "⚔️" },
  armor: { label: "防具", icon: "🛡️" },
  accessory: { label: "アクセ", icon: "💍" },
};

const RARITIES = {
  N: { weight: 55, multiplier: 1, price: 5 },
  R: { weight: 27, multiplier: 1.5, price: 12 },
  SR: { weight: 12, multiplier: 2.2, price: 30 },
  SSR: { weight: 5, multiplier: 3.3, price: 80 },
  UR: { weight: 1, multiplier: 5, price: 200 },
};

const ENEMIES = [
  ["ぷるぷるスライム", "🟢"],
  ["星くずコウモリ", "🦇"],
  ["わるいキノコ", "🍄"],
  ["ミニゴーレム", "🗿"],
  ["宝箱ミミック", "📦"],
  ["月影オオカミ", "🐺"],
];

const ITEM_WORDS = {
  weapon: [
    ["星くず", "月光", "ふわふわ", "勇気の", "伝説の"],
    ["つるぎ", "フォーク", "木の枝", "ハムソード", "杖"]
  ],
  armor: [
    ["雲の", "きらめく", "丈夫な", "銀河の", "伝説の"],
    ["マント", "よろい", "毛糸服", "シールド", "ジャケット"]
  ],
  accessory: [
    ["幸運の", "流星の", "ひまわりの", "虹色の", "伝説の"],
    ["指輪", "お守り", "リボン", "首飾り", "バッジ"]
  ],
};

const defaultState = () => ({
  level: 1,
  exp: 0,
  gold: 0,
  floor: 1,
  bestFloor: 1,
  hp: 30,
  equipment: { weapon: null, armor: null, accessory: null },
  drops: [],
  logs: [],
  enemy: null,
  exploring: false,
  lastSavedAt: Date.now(),
});

let state = loadGame();
let playerAttackTimer = 0;
let enemyAttackTimer = 0;
let lastFrame = performance.now();

const $ = (id) => document.getElementById(id);
const clampPercent = (value, max) => `${Math.max(0, Math.min(100, (value / max) * 100))}%`;
const randomOf = (array) => array[Math.floor(Math.random() * array.length)];

function itemScore(item) {
  if (!item) return 0;
  return item.attack * 1.2 + item.defense + item.hp * 0.15 + item.speed * 0.7 + item.luck * 0.7;
}

function getStats() {
  const base = {
    maxHp: 30 + (state.level - 1) * 6,
    attack: 5 + (state.level - 1) * 2,
    defense: 2 + Math.floor((state.level - 1) * 1.2),
    speed: 5 + Math.floor((state.level - 1) * 0.4),
    luck: 3 + Math.floor((state.level - 1) * 0.3),
  };

  Object.values(state.equipment).filter(Boolean).forEach((item) => {
    base.maxHp += item.hp;
    base.attack += item.attack;
    base.defense += item.defense;
    base.speed += item.speed;
    base.luck += item.luck;
  });

  return base;
}

function expNeeded() {
  return 20 + (state.level - 1) * 15;
}

function createEnemy() {
  const [name, icon] = randomOf(ENEMIES);
  const boss = state.floor % 10 === 0;
  const scale = 1 + state.floor * 0.16;
  const maxHp = Math.floor((boss ? 34 : 18) * scale);

  state.enemy = {
    name: boss ? `階層主 ${name}` : name,
    icon: boss ? "👑" : icon,
    maxHp,
    hp: maxHp,
    attack: Math.floor((boss ? 7 : 4) * scale),
    defense: Math.floor(state.floor * 0.35),
    exp: Math.floor((boss ? 15 : 6) * scale),
    gold: Math.floor((boss ? 18 : 5) * scale),
  };

  playerAttackTimer = 0;
  enemyAttackTimer = 0;
}

function chooseRarity(luck) {
  const boost = Math.min(20, luck * 0.35);

  const weights = Object.entries(RARITIES).map(([name, info], index) => ({
    name,
    weight: Math.max(1, info.weight + (index === 0 ? -boost : boost * index * 0.12)),
  }));

  let roll = Math.random() * weights.reduce((sum, entry) => sum + entry.weight, 0);
  return weights.find((entry) => (roll -= entry.weight) <= 0).name;
}

function createItem() {
  const slot = randomOf(Object.keys(SLOT_INFO));
  const rarity = chooseRarity(getStats().luck);
  const multiplier = RARITIES[rarity].multiplier;
  const power = Math.max(1, Math.floor((2 + state.floor * 0.32) * multiplier));
  const [prefixes, nouns] = ITEM_WORDS[slot];

  const item = {
    id: `${Date.now()}-${Math.random()}`,
    slot,
    rarity,
    name: `${rarity} ${randomOf(prefixes)}${randomOf(nouns)}`,
    attack: 0,
    defense: 0,
    hp: 0,
    speed: 0,
    luck: 0,
  };

  const mainStat = slot === "weapon"
    ? "attack"
    : slot === "armor"
      ? "defense"
      : randomOf(["speed", "luck"]);

  item[mainStat] = power;

  const bonusStat = randomOf(["attack", "defense", "hp", "speed", "luck"]);
  item[bonusStat] += bonusStat === "hp"
    ? power * 2
    : Math.max(1, Math.floor(power * 0.45));

  return item;
}

function addLog(text, type = "") {
  state.logs.push({ text, type });
  state.logs = state.logs.slice(-40);
}

function playerAttack() {
  if (!state.enemy) return;

  const stats = getStats();
  const critical = Math.random() < Math.min(0.35, stats.luck / 180);
  const damage = Math.max(1, stats.attack - state.enemy.defense + Math.floor(Math.random() * 3));

  state.enemy.hp -= critical ? damage * 2 : damage;

  $("battle-status").textContent = critical
    ? `会心の一撃！ ${damage * 2} ダメージ`
    : `${damage} ダメージを与えた`;

  if (state.enemy.hp <= 0) defeatEnemy();
}

function enemyAttack() {
  if (!state.enemy) return;

  const stats = getStats();
  const damage = Math.max(1, state.enemy.attack - stats.defense + Math.floor(Math.random() * 2));

  state.hp -= damage;
  $("battle-status").textContent = `${state.enemy.name}から ${damage} ダメージ`;

  if (state.hp <= 0) returnHome(true);
}

function defeatEnemy() {
  const enemy = state.enemy;

  state.exp += enemy.exp;
  state.gold += enemy.gold;

  addLog(`${enemy.name}を撃破！ +${enemy.exp} EXP / +${enemy.gold} G`, "good");

  const dropChance = Math.min(0.65, 0.24 + getStats().luck * 0.006);

  if (Math.random() < dropChance) {
    const item = createItem();
    state.drops.unshift(item);
    state.drops = state.drops.slice(0, 6);

    addLog(
      `${item.name} を発見！`,
      item.rarity === "N" || item.rarity === "R" ? "" : "rare"
    );
  }

  while (state.exp >= expNeeded()) {
    state.exp -= expNeeded();
    state.level += 1;
    state.hp = getStats().maxHp;
    addLog(`レベル ${state.level} になった！ HP全回復`, "rare");
  }

  state.floor += 1;
  state.bestFloor = Math.max(state.bestFloor, state.floor);

  createEnemy();
  render();
}

function returnHome(defeated = false) {
  if (defeated) {
    addLog(`${state.floor}Fで力尽きた… 拠点へ帰還`);
  } else {
    addLog(`${state.floor}Fから帰還。HPを全回復！`, "good");
  }

  state.exploring = false;
  state.floor = 1;
  state.hp = getStats().maxHp;

  createEnemy();
  saveGame();
  render();
}

function equipItem(id) {
  const index = state.drops.findIndex((item) => item.id === id);
  if (index < 0) return;

  const item = state.drops[index];
  const previous = state.equipment[item.slot];

  state.equipment[item.slot] = item;
  state.drops.splice(index, 1);

  if (previous) state.drops.unshift(previous);

  state.drops = state.drops.slice(0, 6);
  state.hp = Math.min(state.hp, getStats().maxHp);

  addLog(`${item.name} を装備した！`, "rare");
  saveGame();
  render();
}

function sellItem(id) {
  const index = state.drops.findIndex((item) => item.id === id);
  if (index < 0) return;

  const item = state.drops[index];
  const price = RARITIES[item.rarity].price + Math.floor(itemScore(item));

  state.gold += price;
  state.drops.splice(index, 1);

  addLog(`${item.name} を ${price} Gで売却`);
  saveGame();
  render();
}

function statText(item) {
  return [
    item.attack && `攻+${item.attack}`,
    item.defense && `防+${item.defense}`,
    item.hp && `HP+${item.hp}`,
    item.speed && `速+${item.speed}`,
    item.luck && `運+${item.luck}`,
  ].filter(Boolean).join(" ");
}

function itemHtml(item, slot, isDrop = false) {
  if (!item) {
    return `
      <div class="equipment">
        <span class="item-icon">${SLOT_INFO[slot].icon}</span>
        <div class="item-main">
          <span class="item-name">${SLOT_INFO[slot].label}：未装備</span>
          <span class="item-stats">ドロップを待っています</span>
        </div>
        <span>-</span>
      </div>
    `;
  }

  const current = state.equipment[item.slot];
  const better = isDrop && itemScore(item) > itemScore(current);
  const scoreDifference = Math.floor(itemScore(item) - itemScore(current));

  return `
    <div class="${isDrop ? "drop" : "equipment"} ${better ? "better" : ""}">
      <span class="item-icon">${SLOT_INFO[item.slot].icon}</span>
      <div class="item-main">
        <b class="item-name rarity-${item.rarity}">${item.name}</b>
        <span class="item-stats">
          ${statText(item)}
          ${isDrop ? ` / 現在比 ${scoreDifference >= 0 ? "+" : ""}${scoreDifference}` : ""}
        </span>
      </div>
      ${isDrop
        ? `<div class="drop-actions">
            ${better ? `<button class="equip-button" data-equip="${item.id}">装備</button>` : ""}
            <button data-sell="${item.id}">売却</button>
           </div>`
        : `<span class="item-score">力 ${Math.floor(itemScore(item))}</span>`
      }
    </div>
  `;
}

function render() {
  const stats = getStats();

  if (state.hp > stats.maxHp) state.hp = stats.maxHp;

  $("level").textContent = state.level;
  $("gold").textContent = state.gold.toLocaleString();
  $("floor").textContent = state.floor;
  $("best-floor").textContent = state.bestFloor;
  $("attack").textContent = stats.attack;
  $("defense").textContent = stats.defense;
  $("speed").textContent = stats.speed;
  $("luck").textContent = stats.luck;

  $("player-hp-text").textContent = `${Math.max(0, state.hp)} / ${stats.maxHp}`;
  $("player-hp-bar").style.width = clampPercent(state.hp, stats.maxHp);
  $("exp-text").textContent = `${state.exp} / ${expNeeded()} EXP`;
  $("exp-bar").style.width = clampPercent(state.exp, expNeeded());

  if (state.enemy) {
    $("enemy-icon").textContent = state.enemy.icon;
    $("enemy-name").textContent = state.enemy.name;
    $("enemy-hp-text").textContent = `${Math.max(0, state.enemy.hp)} / ${state.enemy.maxHp}`;
    $("enemy-hp-bar").style.width = clampPercent(state.enemy.hp, state.enemy.maxHp);
  }

  $("start-button").textContent = state.exploring ? "⏸️ 探索停止" : "⚔️ 探索開始";
  $("start-button").classList.toggle("stopping", state.exploring);

  if (!state.exploring) {
    $("battle-status").textContent = "「探索開始」を押すと冒険が始まります";
  }

  $("equipment-list").innerHTML = Object.keys(SLOT_INFO)
    .map((slot) => itemHtml(state.equipment[slot], slot))
    .join("");

  $("drop-list").innerHTML = state.drops.length
    ? state.drops.map((item) => itemHtml(item, item.slot, true)).join("")
    : `<div class="empty">まだ装備は落ちていません。自動探索中… ✨</div>`;

  $("battle-log").innerHTML = state.logs
    .map((log) => `<p class="${log.type}">${log.text}</p>`)
    .join("");

  $("battle-log").scrollTop = $("battle-log").scrollHeight;
}

function saveGame() {
  state.lastSavedAt = Date.now();

  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch {
    // 保存できない環境でもゲームは継続する
  }
}

function loadGame() {
  try {
    const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
    return saved ? { ...defaultState(), ...saved } : defaultState();
  } catch {
    return defaultState();
  }
}

function grantOfflineRewards() {
  const seconds = Math.min(
    8 * 60 * 60,
    Math.max(0, (Date.now() - state.lastSavedAt) / 1000)
  );

  if (seconds < 30 || !$("offline-modal").classList.contains("hidden")) return;

  const victories = Math.floor(seconds / Math.max(6, 15 - state.level * 0.2));
  const gold = victories * Math.max(2, Math.floor(3 + state.bestFloor * 0.25));
  const exp = victories * Math.max(2, Math.floor(3 + state.bestFloor * 0.12));

  state.gold += gold;
  state.exp += exp;

  while (state.exp >= expNeeded()) {
    state.exp -= expNeeded();
    state.level += 1;
  }

  state.hp = getStats().maxHp;

  $("offline-time").textContent = `${Math.floor(seconds / 60)}分間、留守中も探索していました。`;
  $("offline-gold").textContent = gold.toLocaleString();
  $("offline-exp").textContent = exp.toLocaleString();
  $("offline-modal").classList.remove("hidden");

  addLog(`放置報酬：${gold} G / ${exp} EXP`, "rare");

  state.lastSavedAt = Date.now();
  render();
}

function gameLoop(now) {
  const delta = Math.min(100, now - lastFrame);
  lastFrame = now;

  if (!state.exploring) {
    requestAnimationFrame(gameLoop);
    return;
  }

  const stats = getStats();

  playerAttackTimer += delta;
  enemyAttackTimer += delta;

  if (playerAttackTimer >= Math.max(350, 1250 - stats.speed * 22)) {
    playerAttackTimer = 0;
    playerAttack();
    render();
  }

  if (enemyAttackTimer >= 1450) {
    enemyAttackTimer = 0;
    enemyAttack();
    render();
  }

  requestAnimationFrame(gameLoop);
}

$("return-button").addEventListener("click", () => returnHome(false));

$("start-button").addEventListener("click", () => {
  state.exploring = !state.exploring;

  addLog(
    state.exploring
      ? `${state.floor}Fの探索を開始！`
      : "探索を一時停止しました。",
    state.exploring ? "good" : ""
  );

  saveGame();
  render();
});

$("clear-log-button").addEventListener("click", () => {
  state.logs = [];
  render();
});

$("offline-close-button").addEventListener("click", () => {
  $("offline-modal").classList.add("hidden");
  saveGame();
  render();
});

$("drop-list").addEventListener("click", (event) => {
  if (event.target.dataset.equip) equipItem(event.target.dataset.equip);
  if (event.target.dataset.sell) sellItem(event.target.dataset.sell);
});

window.addEventListener("beforeunload", saveGame);

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    saveGame();
  } else {
    grantOfflineRewards();
    render();
  }
});

grantOfflineRewards();

if (!state.enemy || state.enemy.hp <= 0) createEnemy();

state.hp = Math.max(1, Math.min(state.hp, getStats().maxHp));
state.exploring = false;

render();
setInterval(saveGame, 5000);
requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
